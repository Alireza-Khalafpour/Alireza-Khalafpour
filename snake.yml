name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: Alireza-Khalafpour
          outputs: dist/snake.svg

      - name: Push snake.svg to output branch
        uses: actions/upload-artifact@v3
        with:
          name: snake
          path: dist/
